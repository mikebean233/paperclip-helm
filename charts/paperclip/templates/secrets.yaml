{{/*
Optional: Create secrets directly from values.
These are convenience helpers — users can also create secrets externally and reference them.
Only rendered when the corresponding .create flag is true.
*/}}

{{- if .Values.auth.secretRef.create | default false }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "paperclip.fullname" . }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.secretRef.key | default "BETTER_AUTH_SECRET" }}: {{ .Values.auth.secretRef.value | quote }}
{{- end }}

{{- if .Values.auth.adminUser.passwordSecretRef.create | default false }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "paperclip.fullname" . }}-admin-password
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.adminUser.passwordSecretRef.key | default "password" }}: {{ .Values.auth.adminUser.passwordSecretRef.value | quote }}
{{- end }}

{{- if .Values.adapters.apiKeysSecretRef.create | default false }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "paperclip.fullname" . }}-api-keys
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $val := .Values.adapters.apiKeysSecretRef.data }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}

{{- if .Values.secrets.masterKeySecretRef.create | default false }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "paperclip.fullname" . }}-master-key
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.masterKeySecretRef.key | default "MASTER_KEY" }}: {{ .Values.secrets.masterKeySecretRef.value | quote }}
{{- end }}

{{- if .Values.database.externalURLSecretRef.create | default false }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "paperclip.fullname" . }}-database-url
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.database.externalURLSecretRef.key | default "DATABASE_URL" }}: {{ .Values.database.externalURLSecretRef.value | quote }}
{{- end }}
